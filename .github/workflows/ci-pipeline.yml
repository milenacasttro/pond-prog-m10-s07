name: CI/CD Pipeline - Anlise de Desempenho

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: ~/.cache/pip

jobs:
  setup:
    name: Setup & Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cdigo
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  lint:
    name: Code Quality (Flake8)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout cdigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 analysis
        id: flake8
        continue-on-error: true
        run: |
          echo "Iniciando anlise de linting..."
          flake8 src/ tests/ --format=json > flake8-report.json || true
          flake8 src/ tests/ --statistics
          echo "flake8_status=completed" >> $GITHUB_OUTPUT

      - name: Upload flake8 report
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.json
          if-no-files-found: warn

  test:
    name: Run Tests (Pytest)
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout cdigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        id: pytest
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=json \
            --cov-report=term \
            --cov-report=html \
            --tb=short \
            --junit-xml=test-results.xml

      - name: Capture test metrics
        if: always()
        run: |
          echo "Test execution completed at $(date)" > test-metrics.txt
          python -m pytest tests/ --co -q | wc -l >> test-metrics.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            htmlcov/
            .coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: warn

  report:
    name: Generate Metrics Report
    runs-on: ubuntu-latest
    needs: [setup, lint, test]
    if: always()

    steps:
      - name: Checkout cdigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Collect workflow metrics
        id: metrics
        run: |
          cat > workflow_metrics.json << 'EOF'
          {
            "workflow_run_id": "${{ github.run_id }}",
            "workflow_run_number": "${{ github.run_number }}",
            "commit_sha": "${{ github.sha }}",
            "commit_message": "${{ github.event.head_commit.message }}",
            "branch": "${{ github.ref_name }}",
            "actor": "${{ github.actor }}",
            "timestamp": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "event": "${{ github.event_name }}",
            "status": "completed"
          }
          EOF
          cat workflow_metrics.json

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create summary report
        run: |
          echo "# Workflow Execution Summary" > workflow-summary.md
          echo "" >> workflow-summary.md
          echo "**Run ID:** ${{ github.run_id }}" >> workflow-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> workflow-summary.md
          echo "**Commit:** ${{ github.sha }}" >> workflow-summary.md
          echo "**Time:** $(date)" >> workflow-summary.md

      - name: Upload workflow metrics
        uses: actions/upload-artifact@v4
        with:
          name: workflow-metrics
          path: |
            workflow_metrics.json
            workflow-summary.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '##  Pipeline Execution Complete\n\n**Workflow Run:** #${{ github.run_id }}\n**Status:** Completed'
            })
