name: CI Paralelo (com cache)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install flake8
      - run: flake8 src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt

      - name: Rodar pytest
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term \
            --junit-xml=test-results.xml

      - name: Exportar resumo de testes
        if: always()
        run: |
          python - <<'PY'
          import json
          import xml.etree.ElementTree as ET
          from pathlib import Path

          root = ET.parse("test-results.xml").getroot()
          summary = {
              "test_count": int(root.attrib.get("tests", 0)),
              "test_failures": int(root.attrib.get("failures", 0))
              + int(root.attrib.get("errors", 0)),
          }
          Path("test-summary.json").write_text(json.dumps(summary))
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-paralelo
          path: |
            test-results.xml
            test-summary.json

  report:
    name: Report
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true

      - name: Gerar metricas do workflow
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          summary = {"test_count": 0, "test_failures": 0}
          if Path("test-summary.json").exists():
              summary = json.loads(Path("test-summary.json").read_text())

          payload = {
              "workflow": "ci-paralelo",
              "run_id": "${{ github.run_id }}",
              "commit_sha": "${{ github.sha }}",
              "timestamp": datetime.now(timezone.utc).isoformat(),
              **summary,
          }
          Path("workflow-metrics.json").write_text(json.dumps(payload, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: workflow-metrics-paralelo
          path: workflow-metrics.json
